<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Testando prompt de média no javascript</title>
</head>
<body>
    
    <h1>Testando prompt de média no javascript</h1>

    <script>
        let nota1 = parseFloat(prompt("Insira a nota do primeiro bimestre: "))
            document.write("A primeira nota é: " + nota1)

        let nota2 = parseFloat(prompt("Insira a nota do primeiro bimestre: "))
            document.write("<br> A segunda nota é: " + nota2)
            
        let nota3 = parseFloat(prompt("Insira a nota do primeiro bimestre: "))
            document.write("<br> A terceira nota é: " + nota3)

        let nota4 = parseFloat(prompt("Insira a nota do primeiro bimestre: "))
            document.write("<br> A quarta nota é: " + nota4)

        let media = (nota1 + nota2 + nota3 + nota4) / 4
            document.write("<br> <br> A média das notas é igual a: " + media)

    </script>

</body>
</html>
