<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=
    , initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <script>

        let peso = parseFloat(prompt("Digite seu peso:(ex: 70.5)"));
        let altura = parseFloat(prompt("Digite sua altura (ex: 1.75)"));

        let imc = peso / (altura * altura);
        let imcformat = imc.toFixed(2)

       if (imc < 18.5) {
        alert("Seu IMC é " + imc + ": abaixo do peso");
        }       
        else if (imc >= 18.5 && imc <= 24.9) {
            alert("Seu IMC é " + imcformat + ": peso normal");
        } 
        else if (imc > 24.9 && imc <= 29.9) {
            alert("Seu IMC é " + imcformat + ": sobrepeso");
        } 
        else if (imc > 29.9 && imc <= 34.9) {
            alert("Seu IMC é " + imcformat + ": obesidade grau 1");
        } 
        else if (imc > 34.9 && imc <= 39.9) {
            alert("Seu IMC é " + imcformat + ": obesidade grau 2");
        } 
        else if (imc > 40) {
            alert("Seu IMC é " + imcformat + ": obesidade grau 3 ou mórbida");
        }
        else{
            alert("Valor inválido")
        }


</script>

    


</body>
</html>
