<body>
    <script>

            let dentro = 0;
    let fora = 0;

    for (let i = 1; i <= 10; i++) {
        let valor = parseFloat(prompt(`Informe o ${i}º valor:`));

        if (valor >= 24 && valor <= 42) {
            dentro++;
        } else {
            fora++;
        }
}

console.log(`Valores entre 24 e 42: ${dentro}`);
console.log(`Valores fora do intervalo: ${fora}`);
    </script>
</body>
