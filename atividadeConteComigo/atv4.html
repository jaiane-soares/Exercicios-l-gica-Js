<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
       
let soma = 0;
let quantidade = 0;


for (let i = 15; i <= 100; i++) {
    soma = soma + i;    
    quantidade++;       
}


let media = soma / quantidade;

document.write("A soma total é: " + soma + "<br>");
document.write("A quantidade de números entre 15 e 100 é: " + quantidade + "<br>");
document.write("A média aritmética é: " + media);
    </script>
</body>

</html>
