<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>

        
    let valor1 = Number(prompt("Digite o primeiro valor:"));


    let valor2;


        do {
        valor2 = Number(prompt("Digite o segundo valor (deve ser maior que ZERO):"));

        if (valor2 <= 0) {
        alert("Valor inválido! O segundo número não pode ser zero ou negativo.");
        }

        } while (valor2 <= 0);


            let resultado = valor1 / valor2;


        document.write("O resultado da divisão de " + valor1 + " por " + valor2 + " é: " + resultado);
    </script>
</body>
</html>
