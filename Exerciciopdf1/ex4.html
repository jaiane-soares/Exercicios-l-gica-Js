<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>
<body>
    <script>
        const calcularTotal = (valor1, quant1, valor2, quant2, ipi) => {
            return (valor1 * quant1 + valor2 * quant2) * (ipi / 100 + 1);
        };

        console.log(`Total a pagar: ${calcularTotal(50, 2, 30, 3, 10)}`);


    </script>
</body>
