<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cálculo de Dias</title>
</head>
<body>
    <script>
        
        let anos = prompt("Digite a quantidade de anos:");
        let meses = prompt("Digite a quantidade de meses:");
        let dias = prompt("Digite a quantidade de dias:");

        
        const totalDias = (anos * 365) + (meses * 30) + dias;

        
        console.log("Total em dias: " + totalDias);
        alert("O total de dias acumulados é: " + totalDias);
    </script>
</body>
</html>
