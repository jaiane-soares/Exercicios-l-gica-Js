<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let somaDez = 0;
    for (let i = 1; i <= 10; i++) {
        let num = parseFloat(prompt("Digite o " + i + "º número:"));
        somaDez += num;
    }
    console.log("A soma dos 10 números é: " + somaDez);
    </script>
</body>
</html>
