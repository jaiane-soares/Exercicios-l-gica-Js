<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let somaTotal = 0;
        let numeroDigitado = 0;


        while (true) {
            numeroDigitado = parseFloat(prompt("Digite um número para somar (ou um negativo para sair):"));

            if (numeroDigitado < 0) {
                break; 
            }

            somaTotal += numeroDigitado;
        }

        console.log("A soma total dos números positivos digitados é: " + somaTotal);
        alert("Soma encerrada! Resultado: " + somaTotal);
    </script>
</body>
</html>
