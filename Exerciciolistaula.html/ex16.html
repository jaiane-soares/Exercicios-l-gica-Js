<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let acumuladorIdades = 0;
    let quantidadePessoas = 20;

    for (let i = 1; i <= quantidadePessoas; i++) {
        let idade = parseInt(prompt("Digite a idade da " + i + "ª pessoa:"));
        acumuladorIdades += idade;
    }

    
    let media = acumuladorIdades / quantidadePessoas;

    console.log("A média das idades informadas é: " + media.toFixed(1));
    alert("A média das idades informadas é: " + media.toFixed(1));
    </script>
</body>
</html>
