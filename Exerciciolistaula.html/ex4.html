<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>

       let a= parseFloat(prompt("Digite um valor inteiro:"))
       let b = parseFloat(prompt("Digite outro valor inteiro:"))
       let c = parseFloat(prompt("Digite outro valor inteiro:"))

       let lista = [a, b, c ]

       lista.sort((x,y) => y-x);

       alert("Os valores são " + lista.join)
       console.log("Resultado:", lista)

    </script>
</body>
</html>
