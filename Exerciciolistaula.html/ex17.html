<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let contadorMaiores = 0;

    for (let i = 1; i <= 20; i++) {
        let idade = parseInt(prompt("Digite a idade da " + i + "ª pessoa:"));
        if (idade >= 18) {
            contadorMaiores++; // Soma +1 ao contador
        }
    }

    console.log("Total de pessoas maiores de idade: " + contadorMaiores);
        </script>
    </body>
    </html>
