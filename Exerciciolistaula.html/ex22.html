<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let contagemIntervalo = 0;

for (let i = 1; i <= 20; i++) {
    let num = parseFloat(prompt("Digite o " + i + "º número:"));
    if (num >= 0 && num <= 100) {
        contagemIntervalo++;
    }
}

console.log("Quantidade de números entre 0 e 100: " + contagemIntervalo);
    </script>
</body>
</html>
