<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let saldo = parseFloat(prompt("Digite o saldo:"));
    let saldoReajustado = saldo * 1.015; // 1 representa 100% e 0.015 representa 1.5%

    console.log("Saldo com reajuste: R$ " + saldoReajustado.toFixed(2));
    </script>
</body>
</html>
