<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>

            
    let ipi = parseFloat(prompt("Digite a porcentagem do IPI (ex: 10 para 10%):"));


    let cod1 = prompt("Digite o código da peça 1:");
    let valor1 = parseFloat(prompt("Digite o valor unitário da peça 1:"));
    let quant1 = parseInt(prompt("Digite a quantidade de peças 1:"));


    let cod2 = prompt("Digite o código da peça 2:");
    let valor2 = parseFloat(prompt("Digite o valor unitário da peça 2:"));
    let quant2 = parseInt(prompt("Digite a quantidade de peças 2:"));


    let valorTotal = (valor1 * quant1 + valor2 * quant2) * (ipi / 100 + 1);


    console.log("--- Resumo da Compra ---");
    console.log("Peça " + cod1 + ": " + quant1 + " un x R$ " + valor1.toFixed(2));
    console.log("Peça " + cod2 + ": " + quant2 + " un x R$ " + valor2.toFixed(2));
    console.log("IPI aplicado: " + ipi + "%");
    console.log("------------------------");
    console.log("VALOR TOTAL A PAGAR: R$ " + valorTotal.toFixed(2));


    alert("O valor total a ser pago (com " + ipi + "% de IPI) é: R$ " + valorTotal.toFixed(2));
    </script>
</body>
</html>
