<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>

        let salarioMinimo = 1212.00;
        let salarioUsuario = parseFloat(prompt("Digite o seu salário:"));
        let quantidadeSalarios = salarioUsuario / salarioMinimo;

        console.log("Você ganha o equivalente a " + quantidadeSalarios.toFixed(2) + " salários mínimos.");
            </script>
</body>
</html>
