<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let contagemOito = 0;

    for (let i = 1; i <= 20; i++) {
        let num = parseFloat(prompt("Digite o " + i + "º número:"));
        if (num > 8) {
            contagemOito++;
        }
    }

    console.log("Quantidade de números maiores que 8: " + contagemOito);
    </script>
</body>
</html>
