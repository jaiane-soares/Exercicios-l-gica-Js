<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let nome = prompt("Nome do vendedor:");
    let salarioFixo = parseFloat(prompt("Salário fixo:"));
    let totalVendas = parseFloat(prompt("Total de vendas (em R$):"));

    let comissao = totalVendas * 0.15;
    let salarioFinal = salarioFixo + comissao;

    console.log("Vendedor: " + nome);
    console.log("Salário Fixo: R$ " + salarioFixo.toFixed(2));
    console.log("Salário Final (com 15% de comissão): R$ " + salarioFinal.toFixed(2));
    </script>
</body>
</html>
