<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
   <script>

    let num = Number(prompt("Digite um numero que diremos seu antecessor e sucessor"));
    let antecessor = num - 1;
    let sucessor = num + 1;


    document.write("O antecessor é: " + antecessor + "<br>" + "O sucessor é: " + sucessor);

   </script> 
</body>
</html>
