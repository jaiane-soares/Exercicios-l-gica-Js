<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let cotacao = parseFloat(prompt("Digite a cotação do dólar hoje (R$):"));
    let qtdDolar = parseFloat(prompt("Quantos dólares você possui (US$):"));

    let valorReal = qtdDolar * cotacao;

    alert("Você tem o equivalente a R$ " + valorReal.toFixed(2));
    </script>
</body>
</html>
