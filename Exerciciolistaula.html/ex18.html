<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let nomeNovo = "";
    let idadeNova = 999; // Começamos com um valor alto para qualquer idade ser menor que ele

    for (let i = 1; i <= 10; i++) {
        let nome = prompt("Digite o nome da " + i + "ª pessoa:");
        let idade = parseInt(prompt("Digite a idade de " + nome + ":"));

        if (idade < idadeNova) {
            idadeNova = idade;
            nomeNovo = nome;
        }
    }

    console.log("A pessoa mais nova é: " + nomeNovo + " com " + idadeNova + " anos.");
    </script>
</body>
</html>
