<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>

            
    let media1 = (8 + 9 + 7) / 3;
    let media2 = (4 + 5 + 6) / 3;


    let somaMedias = media1 + media2;
    let mediaDasMedias = somaMedias / 2;


    console.log("Média de 8, 9, 7: " + media1);
    console.log("Média de 4, 5, 6: " + media2);
    console.log("Soma das duas médias: " + somaMedias);
    console.log("Média das médias: " + mediaDasMedias);


    alert(
        "Resultados:\n" +
        "- Média 1: " + media1 + "\n" +
        "- Média 2: " + media2 + "\n" +
        "- Soma das Médias: " + somaMedias + "\n" +
        "- Média das Médias: " + mediaDasMedias
    );
    </script>
</body>
</html>
